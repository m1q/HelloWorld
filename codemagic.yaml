workflows:
  react-native-android:
    name: React Native Android Debug
    max_build_duration: 60
    environment:
      node: 18
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Generate Gradle wrapper
        script: |
          cd android
          gradle wrapper --gradle-version 8.10.2
          chmod +x gradlew

      - name: Create autolinking.json
        script: |
          mkdir -p android/build/generated/autolinking
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const rnVersion = pkg.dependencies['react-native'] || '0.76.5';
            const autolink = {
              reactNativeVersion: rnVersion,
              project: {
                android: {
                  packageName: 'com.helloworld',
                  sourceDir: 'android',
                  appName: 'HelloWorld'
                }
              },
              dependencies: {}
            };
            fs.writeFileSync(
              'android/build/generated/autolinking/autolinking.json',
              JSON.stringify(autolink, null, 2)
            );
            console.log('autolinking.json created successfully');
          "

      - name: Build Android debug APK
        script: |
          cd android
          ./gradlew assembleDebug --no-daemon

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk

    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
