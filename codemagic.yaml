workflows:
  react-native-android:
    name: React Native Android Debug
    max_build_duration: 60
    environment:
      node: 18
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Remove Zone.Identifier files
        script: |
          find . -name "*Zone.Identifier*" -delete

      - name: Generate Gradle wrapper
        script: |
          cd android
          gradle wrapper --gradle-version 8.10.2
          chmod +x gradlew

      - name: Generate debug keystore
        script: |
          keytool -genkeypair -v \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "Keystore generated!"

      - name: Create autolinking.json
        script: |
          mkdir -p android/build/generated/autolinking
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const autolink = {
              reactNativeVersion: pkg.dependencies['react-native'] || '0.76.5',
              project: {
                android: {
                  packageName: 'com.helloworld',
                  sourceDir: 'android',
                  appName: 'HelloWorld'
                }
              },
              dependencies: {}
            };
            fs.writeFileSync('android/build/generated/autolinking/autolinking.json', JSON.stringify(autolink, null, 2));
            console.log('autolinking.json created');
          "

      - name: Build Android debug APK
        script: |
          cd android
          ./gradlew assembleDebug --no-daemon

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk

    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
